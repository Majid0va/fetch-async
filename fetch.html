<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fech and try</title>
    <style>
        body{
            margin: auto;
            width: 70%;
        }
        #users{
            background-color:cadetblue;
             margin-bottom:20px;
             padding:15px;
        }

        #users li{
            display: block;
        }

    </style>
</head>
<body>
    <div id="users"></div>

    <script>

    const div = document.querySelector("#users");
    window.addEventListener("load", postExternal);
    const url = "https://jsonplaceholder.typicode.com/users";

        function postExternal() {
            fetch(url, {

            method: "GET"

            })
            .then(res => res.json())
            .then(json => {

            let output = ``;

        for(let user of json) {
                        
            output = `
                            
            <ul> 
             <li> ${user.id} </li>   
             <li> ${user.name} </li>
             <li> ${user.username} </li>
             <li> ${user.email} </li>
            </ul>
         `;

            div.innerHTML += output;     
                   
        }
               
    })

    .catch(error => 
        console.log("error 404 found"));
     }

    postExternal(url);
    
</script>
</body>
</html>
